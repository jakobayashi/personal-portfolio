<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/mobile.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="nav-link">Projects</a>
      <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
      <a href="/resume.pdf" class="nav-link" target="_blank" rel="noopener">Resume</a>
    </nav>
  </header>
  {{ content }}
</body>
</html>
