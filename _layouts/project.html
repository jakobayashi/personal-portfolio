---
layout: default
---
<script>document.body.classList.add('project-page');</script>

<div class="project">
  <div class="project-header">
    <a class="back-link" href="{{ '/' | relative_url }}">← Back</a>
    <h1>{{ page.title }}</h1>
  </div>

  {% for section in page.sections %}
    <div class="project-section {% cycle '', 'reverse' %}">
      <div class="section-media tiling-{{ section.tiling | default: 'single' }}">
        {% if section.type == 'video' %}
          <video controls>
            <source src="{{ section.src }}">
          </video>
        {% else %}
          {% for src in section.srcs %}
            <img src="{{ src }}" alt="{{ section.title | default: page.title }}">
          {% endfor %}
        {% endif %}
      </div>
      <div class="section-text">
        {% if section.title %}<h2>{{ section.title }}</h2>{% endif %}
        <p>{{ section.text }}</p>
      </div>
    </div>
  {% endfor %}
</div>
